<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário do Simulador Político</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="panel">
      <h3>Definições</h3>

      <label>Dias reais por ano RP</label>
      <input id="daysPerYear" type="number" min="1" step="1" value="14" />

      <label>Última alteração da data RP</label>
      <input id="lastDateChange" type="date" />

      <label>Data RP definida nessa alteração</label>
      <input id="lastDateEpoch" type="date" />

      <label class="checkbox">
        <input id="fixedYears" type="checkbox" checked />
        Usar anos fixos
      </label>

      <div class="actions">
        <button onclick="applySettings()">Aplicar</button>
        <button onclick="copySettingsLink()">Copiar link</button>
      </div>
    </div>

    <div class="panel">
      <h3>Consultar data específica</h3>

      <label>Data real</label>
      <input id="singleDate" type="date" />

      <label>Hora real</label>
      <input id="singleTime" type="time" value="12:00" />

      <label>Offset GMT</label>
      <input id="singleOffset" type="number" step="1" value="0" />

      <div class="actions">
        <button onclick="getSingleRPTime()">Calcular</button>
      </div>

      <div id="singleRpDate" class="small-result"></div>
    </div>
  </header>

  <main class="clock-wrap">
    <div class="clock-box">
      <div class="clock-label">A data e hora do RP é</div>
      <div id="currentRpDate" class="clock-time"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
